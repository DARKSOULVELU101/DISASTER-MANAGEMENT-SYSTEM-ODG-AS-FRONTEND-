<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>India Disaster Management | Power BI Style Frontend</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><span class="brand-mark">PB</span><div><strong>Disaster BI</strong><small>Python + Frontend</small></div></div>
      <nav id="nav"></nav>
      <div class="side-note"><b>Dataset:</b> India Disaster Management OGD<br/>Run in VS Code with Live Server or Python HTTP server.</div>
    </aside>
    <main>
      <header class="topbar">
        <div>
          <p class="eyebrow">Power BI style analytics dashboard</p>
          <h1 id="pageTitle">Executive Overview</h1>
        </div>
        <div class="filters">
          <label>State <select id="stateFilter"><option value="All">All</option></select></label>
          <label>Disaster <select id="typeFilter"><option value="All">All</option></select></label>
          <label>Year <select id="yearFilter"><option value="All">All</option></select></label>
        </div>
      </header>
      <section id="content" class="content"></section>
    </main>
  </div>
  <script src="https://js.puter.com/v2/"></script>
  <script src="./app.js"></script>
</body>
</html>
